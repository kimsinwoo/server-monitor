<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>서버 일간 리포트</title>
</head>
<body style="margin:0;padding:16px;background:#f4f4f5;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;margin:0 auto;background:#ffffff;border-radius:8px;">
    <tr>
      <td style="padding:20px 24px;border-bottom:1px solid #e5e7eb;">
        <h1 style="margin:0;font-size:18px;color:#111827;">서버 일간 리포트</h1>
        <p style="margin:8px 0 0;font-size:13px;color:#6b7280;">{{DATE_RANGE}}</p>
        <p style="margin:8px 0 0;font-size:13px;color:#374151;"><strong>요약:</strong> {{SUMMARY_LINE}}</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 24px;">
        <h2 style="margin:0 0 12px;font-size:15px;color:#111827;">심각도별 이벤트</h2>
        {{EVENT_TABLES}}
      </td>
    </tr>
    <tr>
      <td style="padding:16px 24px;border-top:1px solid #e5e7eb;">
        <h2 style="margin:0 0 8px;font-size:15px;color:#111827;">카테고리 분포</h2>
        <p style="margin:0;font-size:13px;color:#374151;">{{CATEGORY_STATS}}</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 24px;border-top:1px solid #e5e7eb;">
        <h2 style="margin:0 0 8px;font-size:15px;color:#111827;">자동 복구</h2>
        {{RESOLVED_SECTION}}
      </td>
    </tr>
    <tr>
      <td style="padding:16px 24px;border-top:1px solid #e5e7eb;background:#fafafa;">
        <h2 style="margin:0 0 8px;font-size:15px;color:#111827;">권장 조치</h2>
        {{ACTION_CHECKLIST}}
      </td>
    </tr>
  </table>
</body>
</html>
